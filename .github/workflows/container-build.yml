name: Container Build

on:
  # Trigger after Go Release workflow completes (ensures binary is available)
  workflow_run:
    workflows: ["Go Release"]
    types:
      - completed
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/coreos-agent

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Only run if Go Release succeeded (or if manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # For workflow_run, checkout the commit that triggered the original workflow
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag || 'latest' }}" >> $GITHUB_OUTPUT
            echo "IS_VERSION_TAG=false" >> $GITHUB_OUTPUT
          else
            # Extract tag from the workflow_run event
            TAG="${{ github.event.workflow_run.head_branch }}"
            echo "TAG=${TAG}" >> $GITHUB_OUTPUT
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "IS_VERSION_TAG=true" >> $GITHUB_OUTPUT
            else
              echo "IS_VERSION_TAG=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For version tags: use semver
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.TAG }},enable=${{ steps.tag.outputs.IS_VERSION_TAG == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.TAG }},enable=${{ steps.tag.outputs.IS_VERSION_TAG == 'true' }}
            # Tag as latest for version tags
            type=raw,value=latest,enable=${{ steps.tag.outputs.IS_VERSION_TAG == 'true' }}
            # For manual dispatch: use input tag
            type=raw,value=${{ steps.tag.outputs.TAG }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: go/Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
